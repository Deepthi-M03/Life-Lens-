<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LifeLens - AI Age Adaptive Launcher</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.phone {
  width: 320px;
  height: 600px;
  background: #111;
  border-radius: 35px;
  padding: 15px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.status-bar {
  color: white;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 10px;
}

.lock-screen {
  text-align: center;
  color: white;
}

.camera-frame {
  width: 200px;
  height: 200px;
  border: 3px solid #00ffcc;
  margin: 40px auto;
  position: relative;
  border-radius: 15px;
  overflow: hidden;
}

.scan-line {
  width: 100%;
  height: 4px;
  background: #00ffcc;
  position: absolute;
  animation: scan 2s infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

button {
  padding: 10px 25px;
  border-radius: 20px;
  border: none;
  background: #00ffcc;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #00ccaa;
}

.home-screen {
  display: none;
  color: white;
}

.apps {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.app {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
  cursor: pointer;
}

.app:hover {
  background: rgba(255,255,255,0.3);
  transform: scale(1.05);
}
</style>

</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span>LifeLens AI</span>
    <span id="time"></span>
  </div>

  <!-- Lock Screen -->
  <div class="lock-screen" id="lockScreen">
    <div class="camera-frame">
      <div class="scan-line"></div>
      <p style="margin-top:220px;">Scanning Face...</p>
    </div>
    <button onclick="startScan()">Unlock</button>
  </div>

  <!-- Home Screen -->
  <div class="home-screen" id="homeScreen">
    <h3 id="ageDisplay"></h3>
    <div class="apps" id="appContainer"></div>
  </div>

</div>

<script>

// Show Live Time
setInterval(() => {
  const time = new Date();
  document.getElementById("time").innerText =
    time.getHours() + ":" +
    ("0" + time.getMinutes()).slice(-2);
}, 1000);

function startScan() {

  const lockScreen = document.getElementById("lockScreen");
  const homeScreen = document.getElementById("homeScreen");
  const ageDisplay = document.getElementById("ageDisplay");
  const appContainer = document.getElementById("appContainer");

  setTimeout(() => {

    const age = Math.floor(Math.random() * 25);

    lockScreen.style.display = "none";
    homeScreen.style.display = "block";

    ageDisplay.innerText = "Detected Age: " + age;

    appContainer.innerHTML = "";

    let apps = [];

    if (age < 13) {
      apps = ["🎨 Drawing", "📺 Cartoon TV", "🎮 Kids Game", "📚 Story Book"];
    }
    else if (age < 18) {
      apps = ["📺 YouTube", "💬 WhatsApp", "📚 Study App", "🎵 Music"];
    }
    else {
      apps = ["📸 Instagram", "📘 Facebook", "📺 YouTube", "💬 WhatsApp", "🎬 Netflix", "🎵 Spotify"];
    }

    apps.forEach(app => {
      const div = document.createElement("div");
      div.className = "app";
      div.innerText = app;
      appContainer.appendChild(div);
    });

  }, 2000);
}

</script>

</body>
</html>
